<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#box{
    text-align:center;
}

input{
    width:220px;
    padding:12px;
    font-size:20px;
    text-align:center;
    border:2px solid #000;
    outline:none;
}

button{
    margin-top:12px;
    padding:10px 22px;
    font-size:17px;
    cursor:pointer;
}

#result{
    display:none;
    text-align:center;
}

#message{
    font-size:42px;
    font-weight:bold;
    margin-bottom:20px;
}

#link{
    font-size:54px;
    font-weight:bold;
    word-break:break-word;
    margin-bottom:25px;
}

#code64{
    font-size:28px;
    font-weight:bold;
    letter-spacing:2px;
    color:#444;
}
</style>
</head>

<body>

<div id="box">
    <input type="password" id="code" placeholder="Enter Code" maxlength="5">
    <br>
    <button onclick="check()">Enter</button>

    <div id="result">
        <div id="message">the truth does not move</div>
        <div id="link">middle-suffix.gl.joinmc.link</div>
        <div id="code64">MS4yMS4xMQ==</div>
    </div>
</div>

<script>
function check() {
    const value = document.getElementById("code").value;

    if (value === "15246") {
        document.getElementById("code").style.display = "none";
        document.querySelector("button").style.display = "none";
        document.getElementById("result").style.display = "block";
    } else {
        document.getElementById("code").value = "";
    }
}

document.getElementById("code").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        check();
    }
});
</script>

</body>
</html>
